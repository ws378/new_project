[pytest]
markers =
    formal_contract: 正式覆盖规划契约、factory、router、preprocessing 和 planner 基础行为。
    ui_contract: UI 入口、参数显示隐藏和用户可见模式契约。
    export_contract: 覆盖路径仓库导入导出和 diagnostics 导出契约。
    adapter_contract: 非 formal factory 的 adapter / routing 入口契约。
    shelf_grid: ShelfAware 节点生成、路径后处理和 TurnCost repaired grid 相关契约。
    readonly_diagnostic: 只读诊断、可视化诊断和资产索引，不改变路径。
    research_experiment: 研究性实验、后处理、候选重连和局部优化证据。
    reference_reproduction: 论文 official / 替代 solver / guidance / square8 等参考复现实验。
    archived_evidence: 历史归档证据测试。
    optional_env: 依赖可选环境、重型依赖或非 formal UI 验收必跑项。
